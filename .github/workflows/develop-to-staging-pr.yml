name: Auto Pull Request to Staging

on:
  push:
    branches:
      - develop

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pull-request:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: develop
          base: staging
          title: "Promover cambios de develop a staging"
          body: "Este es un Pull Request automático creado al subir cambios a la rama develop."
          labels: |
            auto-pr
            develop
