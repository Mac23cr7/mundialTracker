name: Auto Pull Request to Master

on:
  push:
    branches:
      - staging

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pull-request:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: staging
          base: master
          title: "Promote staging changes to master"
          body: "This is an automatic Pull Request created when changes were pushed to the staging branch. Review the changes before merging to master."
          labels: |
            auto-pr
            staging
